<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" href="favicon.png" />
		<link rel="apple-touch-icon" href="favicon.png" />
		<title>how bad is it?</title>
		<meta
			name="description"
			content="Drop your agent usage stats and find out if you probably need a break."
		/>
		<meta property="og:title" content="how bad is it?" />
		<meta
			property="og:description"
			content="Drop your agent usage stats and find out if you probably need a break."
		/>
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #0a0a0a;
				--bg-subtle: #141414;
				--bg-card: #1a1a1a;
				--text: #a0a0a0;
				--text-bright: #e0e0e0;
				--green: #4af626;
				--green-dim: #2a8a15;
				--yellow: #f5c542;
				--red: #ff6b6b;
				--blue: #6bb5ff;
				--gold: #f0d9af;
				--muted: #666;
				--font:
					ui-monospace, SFMono-Regular, 'SF Mono', Monaco, 'Cascadia Code',
					'Roboto Mono', Consolas, 'Courier New', monospace;
				--heat-0: #161b22;
				--heat-1: #0e4429;
				--heat-2: #006d32;
				--heat-3: #26a641;
				--heat-4: #39d353;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				background: var(--bg);
				color: var(--text);
				font-family: var(--font);
				font-size: 14px;
				line-height: 1.6;
				min-height: 100vh;
				overflow-x: hidden;
			}

			#app {
				max-width: 760px;
				margin: 0 auto;
				padding: 2rem 1.5rem 6rem;
			}

			/* ─── Landing ─────────────────────────── */

			#landing {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 80vh;
				text-align: center;
			}

			.ascii-title {
				color: var(--green);
				font-size: 2rem;
				font-weight: bold;
				margin-bottom: 2rem;
				opacity: 0;
			}

			.ascii-title span {
				transition: none;
			}

			.title-cursor {
				vertical-align: middle;
				margin-left: 2px;
			}

			#drop-zone {
				border: 2px dashed var(--muted);
				border-radius: 8px;
				padding: 3rem 2rem;
				width: 100%;
				max-width: 480px;
				cursor: pointer;
				transition:
					border-color 0.3s,
					background 0.3s,
					opacity 0.6s,
					transform 0.4s;
				opacity: 0;
				transform: translateY(10px);
				position: relative;
			}

			#drop-zone.visible {
				opacity: 1;
				transform: translateY(0);
			}

			#drop-zone:hover,
			#drop-zone.dragover {
				border-color: var(--green);
				background: rgba(74, 246, 38, 0.03);
			}

			#drop-zone p {
				color: var(--text);
				font-size: 13px;
			}
			#drop-zone .hint {
				color: var(--muted);
				font-size: 11px;
				margin-top: 0.75rem;
			}

			.path-text {
				color: var(--gold);
			}

			#sample-link {
				color: var(--muted);
				font-size: 12px;
				margin-top: 1.5rem;
				cursor: pointer;
				opacity: 0;
				transition:
					opacity 0.6s,
					color 0.2s;
				text-decoration: none;
				border: none;
				background: none;
				font-family: var(--font);
			}

			#sample-link.visible {
				opacity: 1;
			}
			#sample-link:hover {
				color: var(--text);
			}

			.attribution-subtle {
				color: var(--muted);
				font-size: 12px;
				margin-top: 12px;
				opacity: 0;
				transition: opacity 0.6s;
			}

			.attribution-subtle.visible {
				opacity: 1;
			}

			.attribution-subtle a {
				color: var(--muted);
				text-decoration: none;
			}

			.attribution-subtle a:hover {
				color: var(--text);
			}

			#cli-note {
				color: var(--muted);
				font-size: 11px;
				margin-top: 1.5rem;
				opacity: 0;
				transition: opacity 0.6s;
			}

			#cli-note.visible {
				opacity: 1;
			}

			#file-input {
				display: none;
			}

			/* ─── Diagnostic Output ──────────────── */

			#diagnostic {
				display: none;
			}
			#diagnostic.active {
				display: block;
			}

			#output {
				white-space: pre-wrap;
				word-break: break-word;
			}

			.cursor {
				display: inline-block;
				width: 0.55em;
				height: 1.1em;
				background: var(--green);
				vertical-align: text-bottom;
				animation: blink 1s step-end infinite;
			}

			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0;
				}
			}

			/* Syntax highlighting classes */
			.h-prompt {
				color: var(--green);
			}
			.h-number {
				color: var(--gold);
				font-weight: bold;
			}
			.h-warn {
				color: var(--yellow);
				font-weight: bold;
			}
			.h-error {
				color: var(--red);
				font-weight: bold;
			}
			.h-info {
				color: var(--blue);
			}
			.h-muted {
				color: var(--muted);
			}
			.h-bright {
				color: var(--text-bright);
			}
			.h-green {
				color: var(--green);
			}
			.h-sep {
				color: var(--muted);
			}
			.h-label {
				color: var(--text);
			}
			.h-bar {
				color: var(--green);
			}

			/* ─── Heatmap ────────────────────────── */

			.heatmap-container {
				margin: 1rem 0 1.5rem;
				opacity: 0;
				transition: opacity 0.8s ease;
				overflow-x: auto;
			}

			.heatmap-container.visible {
				opacity: 1;
			}

			.heatmap-grid {
				display: inline-grid;
				grid-template-rows: auto repeat(7, 14px);
				gap: 3px;
				font-size: 10px;
			}

			.heatmap-cell {
				width: 14px;
				height: 14px;
				border-radius: 2px;
				background: var(--heat-0);
			}

			.heatmap-label {
				display: flex;
				align-items: center;
				color: var(--muted);
				font-size: 10px;
				padding-right: 6px;
			}

			.heatmap-month {
				color: var(--muted);
				font-size: 10px;
				text-align: left;
				padding-bottom: 2px;
				white-space: nowrap;
				overflow: visible;
			}

			/* ─── Diagnosis Card ─────────────────── */

			.diagnosis-card {
				background: var(--bg-card);
				border: 1px solid #2a2a2a;
				border-radius: 8px;
				padding: 1rem 2rem 1.5rem;
				margin: 1.5rem 0;
				opacity: 0;
				transition: opacity 0.8s ease;
				position: relative;
			}

			.diagnosis-card.visible {
				opacity: 1;
			}

			.diagnosis-header {
				margin-bottom: 1.25rem;
			}

			.diagnosis-domain {
				font-size: 20px;
				color: var(--green);
				font-weight: bold;
				letter-spacing: 0.05em;
				margin-bottom: 0.35rem;
			}

			.diagnosis-subtitle {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
			}

			.diagnosis-title {
				font-size: 13px;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			.diagnosis-date {
				font-size: 13px;
				color: var(--muted);
			}

			.severity-meter {
				display: flex;
				gap: 8px;
				align-items: center;
				margin-bottom: 1rem;
			}

			.meter-block {
				width: 34px;
				height: 34px;
				border-radius: 4px;
				transition: background 0.3s;
			}

			.meter-block.filled {
				background: var(--green);
			}

			.meter-block.empty {
				background: #1e1e1e;
				border: 1px solid #2a2a2a;
			}

			.meter-level {
				font-size: 15px;
				color: var(--muted);
				margin-left: 8px;
				white-space: nowrap;
			}

			.severity-label {
				font-size: 36px;
				font-weight: bold;
				margin-bottom: 0.25rem;
				line-height: 1.2;
			}

			.severity-desc {
				color: var(--text);
				font-size: 16px;
				margin-bottom: 1.25rem;
				line-height: 1.5;
			}

			.diagnosis-readout {
				font-size: 16px;
				color: var(--text);
				line-height: 1.8;
				white-space: pre;
			}

			.diagnosis-readout .readout-value {
				color: var(--text-bright);
				font-weight: bold;
			}



			/* ─── Attribution ────────────────────── */

			.attribution {
				margin-top: 2rem;
				opacity: 0;
				transition: opacity 0.8s ease;
			}

			.attribution.visible {
				opacity: 1;
			}

			.attribution a {
				color: var(--muted);
				font-size: 12px;
				text-decoration: none;
				transition: color 0.2s;
			}

			.attribution a:hover {
				color: var(--text);
			}

			/* ─── Reset ──────────────────────────── */


			#card-actions {
				display: flex;
				flex-direction: column;
				align-items: flex-start;
				gap: 1rem;
				margin-top: 1.5rem;
				margin-bottom: 1rem;
				opacity: 0;
				transition: opacity 0.8s ease;
			}

			#card-actions.visible {
				opacity: 1;
			}

			#card-share-btn,
			#download-link {
				color: var(--green);
				font-size: 14px;
				font-weight: bold;
				cursor: pointer;
				background: none;
				border: 1px solid var(--green);
				border-radius: 4px;
				padding: 0.5rem 1.25rem;
				font-family: var(--font);
				transition: background 0.2s, color 0.2s;
			}

			#card-share-btn:hover,
			#download-link:hover {
				background: var(--green);
				color: var(--bg);
			}

			#reset-link {
				color: var(--muted);
				font-size: 12px;
				cursor: pointer;
				background: none;
				border: none;
				font-family: var(--font);
				transition: color 0.2s;
			}

			#reset-link:hover {
				color: var(--text);
			}

			/* ─── Mode Toggle ────────────────────── */

			.mode-toggle {
				display: flex;
				gap: 0;
				margin-bottom: 1.5rem;
				border: 1px solid #2a2a2a;
				border-radius: 4px;
				overflow: hidden;
				width: fit-content;
			}

			.mode-btn {
				background: none;
				border: none;
				color: var(--muted);
				font-family: var(--font);
				font-size: 12px;
				padding: 0.4rem 1rem;
				cursor: pointer;
				transition: background 0.2s, color 0.2s;
			}

			.mode-btn:not(:last-child) {
				border-right: 1px solid #2a2a2a;
			}

			.mode-btn.active {
				background: #1a1a1a;
				color: var(--text-bright);
			}

			.mode-btn:hover:not(.active) {
				color: var(--text);
			}

			/* ─── Interview ──────────────────────── */

			#interview-panel {
				display: none;
			}

			#interview-panel.active {
				display: block;
			}

			.interview-question {
				margin-bottom: 1.5rem;
				opacity: 0;
				transform: translateY(8px);
				transition: opacity 0.3s ease, transform 0.3s ease;
			}

			.interview-question.visible {
				opacity: 1;
				transform: translateY(0);
			}

			.interview-question label {
				display: block;
				color: var(--text-bright);
				font-size: 13px;
				margin-bottom: 0.5rem;
			}

			.interview-question .q-hint {
				color: var(--muted);
				font-size: 11px;
				margin-bottom: 0.5rem;
				display: block;
			}

			.interview-question input[type="date"],
			.interview-question select {
				background: var(--bg-card);
				border: 1px solid #2a2a2a;
				color: var(--text-bright);
				font-family: var(--font);
				font-size: 13px;
				padding: 0.4rem 0.6rem;
				border-radius: 4px;
				width: 100%;
				max-width: 280px;
			}

			.interview-question input[type="date"]:focus,
			.interview-question select:focus {
				outline: none;
				border-color: var(--green-dim);
			}

			.checkbox-group {
				display: flex;
				flex-wrap: wrap;
				gap: 0.5rem;
			}

			.checkbox-group label {
				display: flex;
				align-items: center;
				gap: 0.35rem;
				color: var(--text);
				font-size: 12px;
				cursor: pointer;
			}

			.checkbox-group input[type="checkbox"] {
				accent-color: var(--green);
			}

			#interview-submit {
				background: none;
				border: 1px solid var(--green);
				color: var(--green);
				font-family: var(--font);
				font-size: 13px;
				padding: 0.5rem 1.5rem;
				border-radius: 4px;
				cursor: pointer;
				margin-top: 0.5rem;
				transition: background 0.2s, color 0.2s;
				opacity: 0;
				transform: translateY(8px);
				transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s, color 0.2s;
			}

			#interview-submit.visible {
				opacity: 1;
				transform: translateY(0);
			}

			#interview-submit:hover {
				background: var(--green);
				color: var(--bg);
			}

			.interview-explainer {
				color: var(--text);
				font-size: 12px;
				margin-bottom: 1.5rem;
				line-height: 1.5;
			}

			/* ─── Skip hint ──────────────────────── */

			#skip-hint {
				position: fixed;
				bottom: 1rem;
				right: 1.5rem;
				color: var(--muted);
				font-size: 11px;
				opacity: 0;
				transition: opacity 0.4s;
				pointer-events: none;
			}

			#skip-hint.visible {
				opacity: 1;
			}

			/* ─── Responsive ─────────────────────── */

			@media (max-width: 600px) {
				.ascii-title {
					font-size: 1.5rem;
				}
				#app {
					padding: 1.5rem 1rem 4rem;
				}
				body {
					font-size: 13px;
				}
				.heatmap-cell {
					width: 10px;
					height: 10px;
				}
				.heatmap-grid {
					gap: 2px;
				}
				.diagnosis-card {
					padding: 1.5rem;
				}
				.severity-label {
					font-size: 24px;
				}
				.meter-block {
					width: 22px;
					height: 22px;
				}
				.diagnosis-readout {
					font-size: 12px;
				}
			}
		</style>
		<script>
			window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
		</script>
		<script defer src="/_vercel/insights/script.js"></script>
	</head>
	<body>
		<div id="app">
			<!-- Landing -->
			<div id="landing">
				<div class="ascii-title" id="ascii-title">how bad is it?<span class="cursor title-cursor"></span></div>
				<div class="mode-toggle">
					<button class="mode-btn active" data-mode="drop" onclick="switchMode('drop')">Claude Code</button>
					<button class="mode-btn" data-mode="interview" onclick="switchMode('interview')">Other Computer Agents</button>
				</div>

				<div id="drop-panel">
					<div id="drop-zone">
						<p>1. run <span class="path-text">/stats</span> in Claude Code</p>
						<p>2. drop <span class="path-text">~/.claude/stats-cache.json</span> here</p>
						<p class="hint">or click to browse</p>
						<input type="file" id="file-input" accept=".json" />
					</div>
					<button id="sample-link">or try with sample data from the author</button>
					<div class="attribution-subtle">by <a href="https://maro.fyi" target="_blank">maro.fyi</a></div>
				</div>

				<div id="interview-panel">
					<p class="interview-explainer">Computer Agents = Agents with filesystem and shell tools (Codex, Claude Cowork, etc.)</p>

					<div class="interview-question" data-q="0">
						<label>when did you start using Computer Agents?</label>
						<span class="q-hint">your best guess is fine</span>
						<input type="date" id="q-start-date" />
					</div>

					<div class="interview-question" data-q="1">
						<label>how many conversations have you had? (roughly)</label>
						<select id="q-conversations">
							<option value="">pick one</option>
							<option value="20">a handful (~20)</option>
							<option value="75">a fair amount (~50-100)</option>
							<option value="200">a lot (~200)</option>
							<option value="500">too many (~500)</option>
							<option value="1000">lost count (1000+)</option>
						</select>
					</div>

					<div class="interview-question" data-q="2">
						<label>on a typical day, how much do you use Computer Agents?</label>
						<select id="q-daily-hours">
							<option value="">pick one</option>
							<option value="0.5">a question here and there (&lt;1h)</option>
							<option value="2">a couple of hours (1-3h)</option>
							<option value="5">half the workday (3-6h)</option>
							<option value="8">most of the day (6-10h)</option>
							<option value="12">it's always open (10h+)</option>
						</select>
					</div>

					<div class="interview-question" data-q="3">
						<label>when do you typically start your first session?</label>
						<select id="q-start-hour">
							<option value="">pick one</option>
							<option value="6">early bird (6-8am)</option>
							<option value="9">normal hours (9-10am)</option>
							<option value="11">late starter (11am+)</option>
							<option value="13">afternoon person (1pm+)</option>
							<option value="20">night owl (8pm+)</option>
						</select>
					</div>

					<div class="interview-question" data-q="4">
						<label>do you use Computer Agents on weekends?</label>
						<select id="q-weekends">
							<option value="">pick one</option>
							<option value="never">never</option>
							<option value="sometimes">sometimes</option>
							<option value="regularly">most weekends</option>
							<option value="always">saturday and sunday, every week</option>
						</select>
					</div>

					<div class="interview-question" data-q="5">
						<label>have you used Computer Agents past midnight?</label>
						<select id="q-midnight">
							<option value="">pick one</option>
							<option value="never">never</option>
							<option value="once">once or twice</option>
							<option value="sometimes">it happens</option>
							<option value="regularly">more than I'd admit</option>
						</select>
					</div>

					<div class="interview-question" data-q="6">
						<label>do you use Computer Agents on your phone?</label>
						<span class="q-hint">Claude Code Web, Codex Cloud, etc.</span>
						<select id="q-mobile">
							<option value="">pick one</option>
							<option value="never">never</option>
							<option value="rarely">rarely, in emergencies</option>
							<option value="sometimes">sometimes on the go</option>
							<option value="regularly">regularly, it's on my home screen</option>
						</select>
					</div>

					<div class="interview-question" data-q="7">
						<label>what's your longest single session been?</label>
						<select id="q-longest">
							<option value="">pick one</option>
							<option value="0.5">quick chat (&lt;30 min)</option>
							<option value="2">a good session (1-2h)</option>
							<option value="5">deep dive (3-5h)</option>
							<option value="8">marathon (5-8h)</option>
							<option value="12">I lost track of time (8h+)</option>
						</select>
					</div>

					<button id="interview-submit" onclick="submitInterview()">run diagnostic</button>
				</div>
			</div>

			<!-- Diagnostic Output -->
			<div id="diagnostic">
				<div id="output"></div>
			</div>

			<div id="skip-hint">click or press any key to skip</div>
		</div>

		<script>
			// ============================================================
			// TERMINAL ENGINE
			// ============================================================

			const TYPING_SPEED = 8;
			let diagnosticRawData = null;
			let skipRequested = false;
			let isTyping = false;
			let autoScrollEnabled = true;
			let userScrolledUp = false;

			function delay(ms) {
				return new Promise((resolve) => {
					if (skipRequested) {
						resolve();
						return;
					}
					setTimeout(resolve, ms);
				});
			}

			function calcDelay(char, speed) {
				if (skipRequested) return 0;
				let d = speed;
				if (char === '\n') d = speed * (3 + Math.random() * 2);
				else if (char === '.') d = speed * (2 + Math.random() * 1.5);
				else if (char === ' ') d = speed * (0.8 + Math.random() * 1.2);
				else d = speed * (0.5 + Math.random() * 0.8);
				if (Math.random() < 0.08) d = speed * (5 + Math.random() * 3);
				if (Math.random() < 0.12) d = speed * 0.2;
				return d;
			}

			// Highlight rules applied to completed text
			function highlight(text) {
				// Token-based highlighting: collect matches, replace all at once
				// to avoid regex rules matching inside each other's HTML tags
				const tokens = [];
				function tok(cls, match) {
					const id = '\x00' + tokens.length + '\x00';
					tokens.push({
						id,
						html: '<span class="' + cls + '">' + match + '</span>',
					});
					return id;
				}

				let result = text
					// Prompt lines (must be first - consumes whole line)
					.replace(/^(\$[^\n]*)/gm, (m) => tok('h-prompt', m))
					// WARNING / ERROR
					.replace(/\b(WARNING|ALERT|CRITICAL)\b/g, (m) => tok('h-warn', m))
					.replace(/\b(ERROR)\b/g, (m) => tok('h-error', m))
					// Section separators
					.replace(/(═+|─+|│)/g, (m) => tok('h-sep', m))
					// Progress bar characters
					.replace(/(▓+|░+|█+)/g, (m) => tok('h-bar', m))
					// Dollar amounts (before numbers so $123 isn't partially matched)
					.replace(/(\$[\d,.]+)/g, (m) => tok('h-error', m))
					// Large numbers (4+ digits, with optional commas/dots)
					.replace(/\b(\d{1,3}(?:[,.]?\d{3})+)\b/g, (m) => tok('h-number', m))
					// Percentage
					.replace(/(\d+\.?\d*%)/g, (m) => tok('h-number', m))
					// Dates
					.replace(/(\d{4}-\d{2}-\d{2})/g, (m) => tok('h-info', m))
					// Time patterns like 02:00
					.replace(/\b(\d{2}:\d{2})\b/g, (m) => tok('h-info', m))
					// Quoted strings
					.replace(
						/"([^"\x00]+)"/g,
						(m, inner) => '"' + tok('h-info', inner) + '"',
					);

				// Replace tokens with actual HTML
				tokens.forEach((t) => {
					result = result.replace(t.id, t.html);
				});
				return result;
			}

			const outputEl = document.getElementById('output');
			let cursorEl = null;

			function ensureCursor() {
				if (!cursorEl) {
					cursorEl = document.createElement('span');
					cursorEl.className = 'cursor';
				}
				return cursorEl;
			}

			function removeCursor() {
				if (cursorEl && cursorEl.parentNode)
					cursorEl.parentNode.removeChild(cursorEl);
			}

			function scrollToBottom() {
				if (!autoScrollEnabled || userScrolledUp) return;
				window.scrollTo({
					top: document.body.scrollHeight,
					behavior: 'smooth',
				});
			}

			// Type text into a span appended to #output
			// Strategy: type characters as escaped text, apply highlighting per complete line
			async function typeText(text, speed = TYPING_SPEED) {
				isTyping = true;
				const span = document.createElement('span');
				outputEl.appendChild(span);

				const cursor = ensureCursor();

				// Split into lines for line-by-line highlighting
				const lines = text.split('\n');
				let charIndex = 0;

				for (let li = 0; li < lines.length; li++) {
					const line = lines[li];

					// Type each character of the line as plain text
					for (let ci = 0; ci < line.length; ci++) {
						if (skipRequested) {
							// Skip: render everything highlighted
							span.innerHTML = highlight(escapeHtml(text));
							removeCursor();
							span.appendChild(cursor);
							scrollToBottom();
							isTyping = false;
							return;
						}

						charIndex++;
						// Build: highlighted complete lines + current partial line as plain text
						const completedLines = lines.slice(0, li).join('\n');
						const currentPartial = line.substring(0, ci + 1);
						const fullSoFar =
							completedLines + (li > 0 ? '\n' : '') + currentPartial;

						span.innerHTML = highlight(escapeHtml(fullSoFar));
						removeCursor();
						span.appendChild(cursor);

						if (charIndex % 20 === 0) scrollToBottom();
						await delay(calcDelay(line[ci], speed));
					}

					// Line complete - add the newline
					if (li < lines.length - 1) {
						charIndex++;
						const completedSoFar = lines.slice(0, li + 1).join('\n') + '\n';
						span.innerHTML = highlight(escapeHtml(completedSoFar));
						removeCursor();
						span.appendChild(cursor);
						if (charIndex % 20 === 0) scrollToBottom();
						await delay(calcDelay('\n', speed));
					}
				}

				// Final: full text highlighted
				span.innerHTML = highlight(escapeHtml(text));
				removeCursor();
				span.appendChild(cursor);
				scrollToBottom();
				isTyping = false;
			}

			function escapeHtml(text) {
				return text
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;');
			}

			// Append raw HTML (for charts, heatmaps) and fade it in
			function appendElement(el) {
				removeCursor();
				outputEl.appendChild(el);
				// Trigger reflow then fade in
				void el.offsetWidth;
				el.classList.add('visible');
				outputEl.appendChild(ensureCursor());
				scrollToBottom();
			}

			// ============================================================
			// DATA PARSER & ANALYZER
			// ============================================================

			function daysBetween(a, b) {
				return Math.round((b - a) / (1000 * 60 * 60 * 24));
			}

			function dayOfWeek(dateStr) {
				return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][
					new Date(dateStr).getDay()
				];
			}

			function formatNum(n) {
				return n.toLocaleString('en-US');
			}

			function analyzeData(raw) {
				const days = raw.dailyActivity || [];
				const firstDate = raw.firstSessionDate
					? new Date(raw.firstSessionDate)
					: new Date(days[0]?.date);
				const lastDate = new Date(days[days.length - 1]?.date);
				const calendarDays = daysBetween(firstDate, lastDate) + 1;

				// Weekend vs weekday
				let weekdayMsgs = 0,
					weekendMsgs = 0,
					weekdayDays = 0,
					weekendDays = 0;
				days.forEach((d) => {
					const dow = new Date(d.date).getDay();
					if (dow === 0 || dow === 6) {
						weekendMsgs += d.messageCount;
						weekendDays++;
					} else {
						weekdayMsgs += d.messageCount;
						weekdayDays++;
					}
				});

				// Hour counts
				const hours = raw.hourCounts || {};
				const totalHourSessions = Object.values(hours).reduce(
					(a, b) => a + b,
					0,
				);
				const nightHours = [23, 0, 1, 2, 3, 4, 5, 6];
				const nightSessions = nightHours.reduce(
					(s, h) => s + (hours[h] || 0),
					0,
				);
				const peakHour = Object.entries(hours).sort((a, b) => b[1] - a[1])[0];

				// Top days
				const topDays = [...days]
					.sort((a, b) => b.messageCount - a.messageCount)
					.slice(0, 5);

				// Cost
				const costBreakdown = calculateCosts(raw.modelUsage || {});

				// Severity
				const msgsPerDay = raw.totalMessages / (days.length || 1);
				const severity = classifySeverity(msgsPerDay);

				// Longest session
				const longest = raw.longestSession || {};
				const longestHours = longest.duration
					? (longest.duration / 1000 / 60 / 60).toFixed(1)
					: 0;

				// Total tokens
				let totalTokens = 0;
				Object.values(raw.modelUsage || {}).forEach((u) => {
					totalTokens +=
						(u.inputTokens || 0) +
						(u.outputTokens || 0) +
						(u.cacheReadInputTokens || 0) +
						(u.cacheCreationInputTokens || 0);
				});

				return {
					firstDate,
					lastDate,
					calendarDays,
					activeDays: days.length,
					totalMessages: raw.totalMessages || 0,
					totalSessions: raw.totalSessions || 0,
					msgsPerActiveDay: Math.round(msgsPerDay),
					msgsPerCalendarDay: Math.round(
						(raw.totalMessages || 0) / (calendarDays || 1),
					),
					dailyActivity: days,
					maxDailyMessages: Math.max(...days.map((d) => d.messageCount), 1),
					hours,
					totalHourSessions,
					nightSessions,
					peakHour,
					topDays,
					costBreakdown,
					severity,
					longest,
					longestHours,
					totalTokens,
					weekdayMsgs,
					weekendMsgs,
					weekdayDays,
					weekendDays,
					isInterview: raw.source === 'interview',
				};
			}

			// ============================================================
			// COST CALCULATOR
			// ============================================================

			const RATES = {
				'claude-opus-4-6': {
					input: 15,
					output: 75,
					cacheRead: 1.875,
					cacheWrite: 18.75,
				},
				'claude-opus-4-5-20251101': {
					input: 15,
					output: 75,
					cacheRead: 1.875,
					cacheWrite: 18.75,
				},
				'claude-sonnet-4-6': {
					input: 3,
					output: 15,
					cacheRead: 0.375,
					cacheWrite: 3.75,
				},
				'claude-sonnet-4-5-20250929': {
					input: 3,
					output: 15,
					cacheRead: 0.375,
					cacheWrite: 3.75,
				},
				'claude-haiku-4-5-20251001': {
					input: 0.25,
					output: 1.25,
					cacheRead: 0.025,
					cacheWrite: 0.3,
				},
			};

			const FALLBACK_RATE = RATES['claude-opus-4-6'];

			function calculateCosts(modelUsage) {
				let total = 0;
				const breakdown = {};
				for (const [model, usage] of Object.entries(modelUsage)) {
					const r = RATES[model] || FALLBACK_RATE;
					const cost =
						((usage.inputTokens || 0) / 1e6) * r.input +
						((usage.outputTokens || 0) / 1e6) * r.output +
						((usage.cacheReadInputTokens || 0) / 1e6) * r.cacheRead +
						((usage.cacheCreationInputTokens || 0) / 1e6) * r.cacheWrite;
					breakdown[model] = cost;
					total += cost;
				}
				return { breakdown, total };
			}

			function pick(arr) {

			// ============================================================
			// HEATMAP RENDERER
			// ============================================================

			function buildHeatmap(data) {
				const container = document.createElement('div');
				container.className = 'heatmap-container';

				const { dailyActivity, maxDailyMessages } = data;

				// Build a map of date -> messageCount
				const dateMap = {};
				dailyActivity.forEach((d) => {
					dateMap[d.date] = d.messageCount;
				});

				// Find date range
				const startDate = new Date(data.firstDate);
				const endDate = new Date(data.lastDate);

				// Align to start of week (Monday)
				const start = new Date(startDate);
				while (start.getDay() !== 1) start.setDate(start.getDate() - 1);

				const end = new Date(endDate);
				while (end.getDay() !== 0) end.setDate(end.getDate() + 1);

				const totalDays = daysBetween(start, end) + 1;
				const weeks = Math.ceil(totalDays / 7);

				// Grid: cols = label + weeks, rows = month-header + 7 days
				const grid = document.createElement('div');
				grid.className = 'heatmap-grid';
				grid.style.gridTemplateColumns = `30px repeat(${weeks}, 14px)`;

				// Month header row
				const dayLabels = ['Mon', '', 'Wed', '', 'Fri', '', ''];

				// First row: month labels
				grid.appendChild(createDiv('')); // empty corner
				let currentMonth = -1;
				for (let w = 0; w < weeks; w++) {
					const weekStart = new Date(start);
					weekStart.setDate(weekStart.getDate() + w * 7);
					const month = weekStart.getMonth();
					const label = document.createElement('div');
					label.className = 'heatmap-month';
					if (month !== currentMonth) {
						label.textContent = weekStart.toLocaleString('en', {
							month: 'short',
						});
						currentMonth = month;
					}
					grid.appendChild(label);
				}

				// 7 day rows
				for (let dow = 0; dow < 7; dow++) {
					const label = document.createElement('div');
					label.className = 'heatmap-label';
					label.textContent = dayLabels[dow];
					grid.appendChild(label);

					for (let w = 0; w < weeks; w++) {
						const cellDate = new Date(start);
						cellDate.setDate(cellDate.getDate() + w * 7 + dow);
						const dateStr = cellDate.toISOString().split('T')[0];
						const count = dateMap[dateStr] || 0;

						const cell = document.createElement('div');
						cell.className = 'heatmap-cell';
						cell.title = `${dateStr}: ${formatNum(count)} messages`;

						if (cellDate < startDate || cellDate > endDate) {
							cell.style.background = 'transparent';
						} else if (count === 0) {
							cell.style.background = 'var(--heat-0)';
						} else {
							const ratio = count / maxDailyMessages;
							if (ratio < 0.15) cell.style.background = 'var(--heat-1)';
							else if (ratio < 0.35) cell.style.background = 'var(--heat-2)';
							else if (ratio < 0.6) cell.style.background = 'var(--heat-3)';
							else cell.style.background = 'var(--heat-4)';
						}
						grid.appendChild(cell);
					}
				}

				container.appendChild(grid);
				return container;
			}

			function createDiv(text) {
				const d = document.createElement('div');
				d.textContent = text;
				return d;
			}

			// Lazy-load html2canvas and render card as PNG
			async function shareCardAsImage() {
				const card = document.getElementById('diagnosis-card');
				const btn = document.getElementById('card-share-btn');
				if (!card || !btn) return;

				btn.textContent = 'rendering...';
				btn.disabled = true;

				try {
					if (!window.html2canvas) {
						await new Promise((resolve, reject) => {
							const s = document.createElement('script');
							s.src =
								'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
							s.onload = resolve;
							s.onerror = reject;
							document.head.appendChild(s);
						});
					}

					const canvas = await html2canvas(card, {
						backgroundColor: '#0a0a0a',
						scale: 2,
						useCORS: true,
					});

					canvas.toBlob(async (blob) => {
						try {
							await navigator.clipboard.write([
								new ClipboardItem({ 'image/png': blob }),
							]);
							btn.textContent = 'copied to clipboard!';
						} catch {
							const url = URL.createObjectURL(blob);
							const a = document.createElement('a');
							a.href = url;
							a.download = 'howbadisit.png';
							a.click();
							URL.revokeObjectURL(url);
							btn.textContent = 'saved!';
						}
						btn.disabled = false;
						setTimeout(() => {
							btn.textContent = 'copy as image';
						}, 2500);
					}, 'image/png');
				} catch {
					btn.textContent = 'copy as image';
					btn.disabled = false;
				}
			}

top 5 most intense days:

`;
				d.topDays.forEach((day, i) => {
					const dow = dayOfWeek(day.date);
					const msgsPerMin = (day.messageCount / (14 * 60)).toFixed(1);
					const toolInfo = day.toolCallCount > 0 ? `, ${formatNum(day.toolCallCount)} tool calls` : '';
					text += `  ${i + 1}. ${day.date} (${dow})
     ${formatNum(day.messageCount)} messages, ${day.sessionCount} sessions${toolInfo}
     that's ~${msgsPerMin} messages per minute over a 14h day
`;
				});

				if (d.longest && d.longestHours > 0) {
					text += `
longest session:  ${d.longestHours}h (${d.longest.messageCount} messages)
`;
				}

				text += '\n';
				return text;
			}

			function generateBillText(d) {
				const { breakdown, total } = d.costBreakdown;

				let text = `─── THE BILL ───────────────────────────────────

estimated API cost if you were paying per token:

`;

				for (const [model, cost] of Object.entries(breakdown)) {
					if (cost < 0.01) continue;
					const shortName = model
						.replace('claude-', '')
						.replace(/-202\d+$/, '');
					text += `  ${shortName.padEnd(24)} $${formatNum(Math.round(cost))}\n`;
				}

				text += `${''.padEnd(24)} ${'─'.repeat(12)}
  ${'total'.padEnd(24)} $${formatNum(Math.round(total))}

`;

				if (total > 10000) {
					text += `ALERT: your subscription is saving you $${formatNum(Math.round(total))}.\n`;
				} else if (total > 1000) {
					text += `that subscription is paying for itself. several times over.\n`;
				}

				text += '\n';
				return text;
			}

			function generateDiagnosisIntro(d) {
				return `─── THE DIAGNOSIS ──────────────────────────────

classification: "${d.severity.label}"

`;
			}

			function generateClosing() {
				return `
─────────────────────────────────────────────────

these numbers measure quantity, not quality.
only you know if this time was well spent.
and if it's time for a detox.

so... how bad is it, really?
`;
			}

			// ============================================================
			// ORCHESTRATOR
			// ============================================================

			async function runDiagnostic(rawData) {
				diagnosticRawData = rawData;
				const data = analyzeData(rawData);

				// Stop sine wave, hide landing, show diagnostic
				const titleEl = document.getElementById('ascii-title');
				if (titleEl._waveRaf) cancelAnimationFrame(titleEl._waveRaf);
				document.getElementById('landing').style.display = 'none';
				const diagEl = document.getElementById('diagnostic');
				diagEl.classList.add('active');
				document.getElementById('skip-hint').classList.add('visible');

				// Intro
				await typeText(generateIntroText(data.isInterview), TYPING_SPEED);
				await delay(400);
				await typeText(generateProgressBar(), 15);
				await delay(300);
				await typeText(generateReportHeader(), TYPING_SPEED);
				await delay(600);

				// Section 1: The Scan
				await typeText(generateScanText(data), TYPING_SPEED);
				await delay(800);

				// Section 2: The Pattern (Heatmap)
				await typeText(generateHeatmapIntro(), TYPING_SPEED);
				await delay(300);
				appendElement(buildHeatmap(data));
				await delay(1200);
				await typeText('\n', TYPING_SPEED);

				// Section 3: The Clock (skip for interview mode)
				if (!data.isInterview) {
					await typeText(generateClockText(data), TYPING_SPEED);
					await delay(400);
				}

				// Section 4: The Spikes (skip for interview mode)
				if (!data.isInterview) {
					await typeText(generateSpikesText(data), TYPING_SPEED);
					await delay(800);
				}

				// Section 5: The Bill (skip for interview mode - no token data)
				if (!data.isInterview) {
					await typeText(generateBillText(data), TYPING_SPEED);
					await delay(1000);
				}

				// Section 6: The Diagnosis
				await typeText(generateDiagnosisIntro(data), TYPING_SPEED);
				await delay(400);
				appendElement(buildDiagnosisCard(data));
				await delay(400);

				// Action buttons right below card
				const btnGroup = document.createElement('div');
				btnGroup.id = 'card-actions';

				const shareBtn = document.createElement('button');
				shareBtn.id = 'card-share-btn';
				shareBtn.textContent = 'copy card as image';
				shareBtn.onclick = shareCardAsImage;
				btnGroup.appendChild(shareBtn);

				const dlBtn = document.createElement('button');
				dlBtn.id = 'download-link';
				dlBtn.textContent = 'export report as html';
				dlBtn.onclick = downloadAsHtml;
				btnGroup.appendChild(dlBtn);

				const resetBtn = document.createElement('button');
				resetBtn.id = 'reset-link';
				resetBtn.textContent = 'reset';
				resetBtn.onclick = reset;
				btnGroup.appendChild(resetBtn);

				appendElement(btnGroup);
				await delay(400);

				// Closing
				await typeText(generateClosing(), TYPING_SPEED * 1.5);

				// Attribution
				await delay(600);
				appendElement(buildAttribution());

				// Done
				document.getElementById('skip-hint').classList.remove('visible');
				removeCursor();
			}

			// ============================================================
			// MODE SWITCHING & INTERVIEW
			// ============================================================

			let interviewMode = false;

			function switchMode(mode) {
				const dropPanel = document.getElementById('drop-panel');
				const interviewPanel = document.getElementById('interview-panel');
				document.querySelectorAll('.mode-btn').forEach(b => {
					b.classList.toggle('active', b.dataset.mode === mode);
				});
				if (mode === 'interview') {
					dropPanel.style.display = 'none';
					interviewPanel.classList.add('active');
					interviewMode = true;
					revealInterviewQuestions();
				} else {
					dropPanel.style.display = '';
					interviewPanel.classList.remove('active');
					interviewMode = false;
				}
			}

			function revealInterviewQuestions() {
				const questions = document.querySelectorAll('.interview-question');
				questions.forEach((q, i) => {
					setTimeout(() => {
						q.classList.add('visible');
					}, 80 * i);
				});
				setTimeout(() => {
					document.getElementById('interview-submit').classList.add('visible');
				}, 80 * questions.length + 100);
			}

			function submitInterview() {
				const startDate = document.getElementById('q-start-date').value;
				const conversations = document.getElementById('q-conversations').value;
				const dailyHours = document.getElementById('q-daily-hours').value;
				const startHour = document.getElementById('q-start-hour').value;
				const weekends = document.getElementById('q-weekends').value;
				const midnight = document.getElementById('q-midnight').value;
				const mobile = document.getElementById('q-mobile').value;
				const longest = document.getElementById('q-longest').value;

				if (!startDate || !conversations || !dailyHours || !startHour || !weekends || !midnight || !mobile || !longest) {
					// Highlight unanswered questions
					const fields = [
						['q-start-date', startDate], ['q-conversations', conversations],
						['q-daily-hours', dailyHours], ['q-start-hour', startHour],
						['q-weekends', weekends], ['q-midnight', midnight], ['q-mobile', mobile], ['q-longest', longest]
					];
					fields.forEach(([id, val]) => {
						const el = document.getElementById(id);
						if (!val) {
							el.style.borderColor = 'var(--red)';
							setTimeout(() => { el.style.borderColor = ''; }, 1500);
						}
					});
					return;
				}

				const rawData = synthesizeFromInterview({
					startDate,
					conversations: parseInt(conversations),
					dailyHours: parseFloat(dailyHours),
					startHour: parseInt(startHour),
					weekends,
					midnight,
					mobile,
					longestSession: parseFloat(longest),
				});

				runDiagnostic(rawData);
			}

			function synthesizeFromInterview(answers) {
				const start = new Date(answers.startDate);
				const now = new Date();
				const totalCalendarDays = Math.max(1, Math.round((now - start) / (1000 * 60 * 60 * 24)));

				// Determine active days ratio based on daily hours
				let activeDayRatio;
				if (answers.dailyHours <= 0.5) activeDayRatio = 0.3;
				else if (answers.dailyHours <= 2) activeDayRatio = 0.5;
				else if (answers.dailyHours <= 5) activeDayRatio = 0.7;
				else if (answers.dailyHours <= 8) activeDayRatio = 0.85;
				else activeDayRatio = 0.95;

				// Weekend multiplier
				let weekendMultiplier;
				if (answers.weekends === 'never') weekendMultiplier = 0;
				else if (answers.weekends === 'sometimes') weekendMultiplier = 0.3;
				else if (answers.weekends === 'regularly') weekendMultiplier = 0.7;
				else weekendMultiplier = 1.0;

				// Mobile usage multiplier on conversations
				let mobileMultiplier = 1;
				if (answers.mobile === 'rarely') mobileMultiplier = 1.1;
				else if (answers.mobile === 'sometimes') mobileMultiplier = 1.25;
				else if (answers.mobile === 'regularly') mobileMultiplier = 1.5;

				const effectiveConversations = Math.round(answers.conversations * mobileMultiplier);

				// Estimate messages per conversation (~10-40 depending on intensity)
				const baseMsgsPerConv = answers.dailyHours <= 0.5 ? 30
				: answers.dailyHours <= 2 ? 100
				: answers.dailyHours <= 5 ? 300
				: answers.dailyHours <= 8 ? 650
				: 1100;
			const convIntensity = answers.conversations <= 20 ? 1
				: answers.conversations <= 75 ? 1.2
				: answers.conversations <= 200 ? 1.6
				: answers.conversations <= 500 ? 2
				: 2.5;
			const msgsPerConv = Math.round(baseMsgsPerConv * convIntensity);
				const totalMessages = effectiveConversations * msgsPerConv;
				const totalSessions = Math.round(effectiveConversations * 1.5);

				// Build daily activity
				const dailyActivity = [];
				const activeDays = Math.round(totalCalendarDays * activeDayRatio);
				const msgsPerActiveDay = Math.round(totalMessages / Math.max(1, activeDays));

				// Distribute across the date range
				let weekdayMsgs = 0, weekendMsgs = 0;
				for (let i = 0; i < totalCalendarDays; i++) {
					const d = new Date(start);
					d.setDate(d.getDate() + i);
					const dow = d.getDay();
					const isWeekend = dow === 0 || dow === 6;

					// Determine if this day is "active"
					let isActive;
					if (isWeekend) {
						isActive = Math.random() < weekendMultiplier * activeDayRatio;
					} else {
						isActive = Math.random() < activeDayRatio;
					}

					if (isActive) {
						// Add variance: some days heavier than others
						const variance = 0.3 + Math.random() * 1.4;
						const dayMsgs = Math.max(1, Math.round(msgsPerActiveDay * variance));
						const daySessions = Math.max(1, Math.round(dayMsgs / msgsPerConv * 1.2));
						const dayDate = d.toISOString().split('T')[0];
						dailyActivity.push({
							date: dayDate,
							messageCount: dayMsgs,
							sessionCount: daySessions,
							toolCallCount: 0,
						});
						if (isWeekend) weekendMsgs += dayMsgs;
						else weekdayMsgs += dayMsgs;
					}
				}

				// Build hour counts from start hour and daily hours
				const hourCounts = {};
				const sessionsForHours = totalSessions;
				const peak = answers.startHour;
				for (let h = 0; h < 24; h++) {
					const hoursFromPeak = Math.min(Math.abs(h - peak), 24 - Math.abs(h - peak));
					const halfSpread = Math.max(2, answers.dailyHours / 2);
					if (hoursFromPeak <= halfSpread) {
						const weight = 1 - (hoursFromPeak / halfSpread) * 0.7;
						hourCounts[h] = Math.max(1, Math.round(sessionsForHours / (answers.dailyHours + 1) * weight));
					}
				}

				// Add mobile sessions (commute, evening, etc.)
				if (answers.mobile === 'sometimes' || answers.mobile === 'regularly') {
					const mobileWeight = answers.mobile === 'regularly' ? 3 : 1.5;
					// Morning commute
					hourCounts[7] = (hourCounts[7] || 0) + Math.round(8 * mobileWeight);
					hourCounts[8] = (hourCounts[8] || 0) + Math.round(5 * mobileWeight);
					// Evening wind-down
					hourCounts[20] = (hourCounts[20] || 0) + Math.round(6 * mobileWeight);
					hourCounts[21] = (hourCounts[21] || 0) + Math.round(10 * mobileWeight);
					hourCounts[22] = (hourCounts[22] || 0) + Math.round(5 * mobileWeight);
				}

				// Add night sessions based on midnight answer
				if (answers.midnight === 'once') {
					hourCounts[23] = (hourCounts[23] || 0) + 2;
					hourCounts[0] = (hourCounts[0] || 0) + 1;
				} else if (answers.midnight === 'sometimes') {
					hourCounts[23] = (hourCounts[23] || 0) + 8;
					hourCounts[0] = (hourCounts[0] || 0) + 5;
					hourCounts[1] = (hourCounts[1] || 0) + 2;
				} else if (answers.midnight === 'regularly') {
					hourCounts[23] = (hourCounts[23] || 0) + 20;
					hourCounts[0] = (hourCounts[0] || 0) + 15;
					hourCounts[1] = (hourCounts[1] || 0) + 10;
					hourCounts[2] = (hourCounts[2] || 0) + 5;
				}

				// Longest session
				const longestDuration = answers.longestSession * 60 * 60 * 1000;
				const longestMsgCount = Math.round(answers.longestSession * msgsPerConv * 0.8);

				const actualTotalMessages = dailyActivity.reduce((s, d) => s + d.messageCount, 0);

				return {
					version: 2,
					source: 'interview',
					dailyActivity,
					totalSessions,
					totalMessages: actualTotalMessages,
					longestSession: {
						duration: longestDuration,
						messageCount: longestMsgCount,
					},
					firstSessionDate: start.toISOString(),
					hourCounts,
					modelUsage: {},
				};
			}

			// ============================================================
			// FILE HANDLING & INIT
			// ============================================================

			function validateData(data) {
				if (!data.dailyActivity || !Array.isArray(data.dailyActivity)) {
					throw new Error('Missing dailyActivity array');
				}
				if (typeof data.totalMessages !== 'number') {
					throw new Error('Missing totalMessages');
				}
				return true;
			}

			function handleFile(file) {
				const reader = new FileReader();
				reader.onload = (e) => {
					try {
						const data = JSON.parse(e.target.result);
						validateData(data);
						runDiagnostic(data);
					} catch (err) {
						alert(
							'Could not parse file: ' +
								err.message +
								'\n\nMake sure this is a stats-cache.json file from ~/.claude/',
						);
					}
				};
				reader.readAsText(file);
			}

			async function loadSampleData() {
				try {
					const resp = await fetch('sample.json');
					const data = await resp.json();
					validateData(data);
					runDiagnostic(data);
				} catch (err) {
					alert('Could not load sample data: ' + err.message);
				}
			}

			function reset() {
				document.getElementById('diagnostic').classList.remove('active');
				outputEl.innerHTML = '';
				document.getElementById('landing').style.display = 'flex';
				cursorEl = null;
				// Reset interview visibility
				document.querySelectorAll('.interview-question').forEach(q => q.classList.remove('visible'));
				document.getElementById('interview-submit').classList.remove('visible');
				if (interviewMode) {
					setTimeout(revealInterviewQuestions, 100);
				}
			}

			// ─── Event Listeners ───────────────────────────

			document.addEventListener('DOMContentLoaded', () => {

				// Auto-run if this is a downloaded standalone file
				if (typeof EMBEDDED_DATA !== 'undefined') {
					runDiagnostic(EMBEDDED_DATA);
					document.addEventListener('keydown', (e) => {
						if (e.key === 'Tab' || e.key === 'Alt' || e.key === 'Meta') return;
						if (isTyping) { skipRequested = true; e.preventDefault(); }
					});
					document.addEventListener('click', () => { if (isTyping) skipRequested = true; });
					return;
				}

				const dropZone = document.getElementById('drop-zone');
				const fileInput = document.getElementById('file-input');
				const sampleLink = document.getElementById('sample-link');
				const asciiTitle = document.getElementById('ascii-title');

				// Landing animation: scramble decode
				function scrambleReveal(el, durationMs = 1200) {
					const glyphs = '!@#$%^&*()_+-=[]{}|;:,.<>?/~`01';
					const cursorSpan = el.querySelector('.title-cursor');
					// Get just the text content without cursor
					const finalText = Array.from(el.childNodes)
						.filter((n) => n !== cursorSpan)
						.map((n) => n.textContent)
						.join('');
					const chars = [];
					for (let i = 0; i < finalText.length; i++) {
						chars.push({
							final: finalText[i],
							isSpace: finalText[i] === ' ' || finalText[i] === '\n',
						});
					}
					const totalChars = chars.filter((c) => !c.isSpace).length;
					const frameMs = 30;
					const totalFrames = Math.ceil(durationMs / frameMs);
					let frame = 0;

					el.style.opacity = '1';

					const interval = setInterval(() => {
						frame++;
						const progress = frame / totalFrames;
						let result = '';
						let nonSpaceIndex = 0;
						for (let i = 0; i < chars.length; i++) {
							const c = chars[i];
							if (c.isSpace) {
								result += c.final;
								continue;
							}
							const charProgress = nonSpaceIndex / totalChars;
							nonSpaceIndex++;
							if (progress > charProgress + 0.3) {
								result += c.final;
							} else if (progress > charProgress - 0.1) {
								result += glyphs[Math.floor(Math.random() * glyphs.length)];
							} else {
								result += ' ';
							}
						}
						el.textContent = result;
						if (cursorSpan) el.appendChild(cursorSpan);

						if (frame >= totalFrames) {
							clearInterval(interval);
							el.textContent = finalText;
							if (cursorSpan) el.appendChild(cursorSpan);
							startSineWave(el);
						}
					}, frameMs);
				}

				function startSineWave(el) {
					const text = el.textContent;
					el.innerHTML = '';
					const spans = [];
					let charIndex = 0;
					for (let i = 0; i < text.length; i++) {
						const ch = text[i];
						if (ch === ' ' || ch === '\n') {
							el.appendChild(document.createTextNode(ch));
						} else {
							const span = document.createElement('span');
							span.textContent = ch;
							el.appendChild(span);
							spans.push({ el: span, index: charIndex });
							charIndex++;
						}
					}
					const cs = document.createElement('span');
					cs.className = 'cursor title-cursor';
					el.appendChild(cs);

					const speed = 1.8;
					const freq = 0.12;
					const minOpacity = 0.35;

					function tick(t) {
						const time = t / 1000;
						for (const s of spans) {
							const v = Math.sin(s.index * freq - time * speed);
							s.el.style.opacity =
								minOpacity + (1 - minOpacity) * (v * 0.5 + 0.5);
						}
						el._waveRaf = requestAnimationFrame(tick);
					}
					el._waveRaf = requestAnimationFrame(tick);
				}

				setTimeout(() => scrambleReveal(asciiTitle, 1000), 200);

				// Show drop zone after scramble finishes
				setTimeout(() => {
					dropZone.classList.add('visible');
					setTimeout(() => {
						sampleLink.classList.add('visible');
						document.querySelector('.attribution-subtle').classList.add('visible');
					}, 400);
				}, 1500);

				// Drop zone
				dropZone.addEventListener('click', () => fileInput.click());
				fileInput.addEventListener('change', (e) => {
					if (e.target.files[0]) handleFile(e.target.files[0]);
				});

				dropZone.addEventListener('dragover', (e) => {
					e.preventDefault();
					dropZone.classList.add('dragover');
				});

				dropZone.addEventListener('dragleave', () => {
					dropZone.classList.remove('dragover');
				});

				dropZone.addEventListener('drop', (e) => {
					e.preventDefault();
					dropZone.classList.remove('dragover');
					if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
				});

				// Sample data
				sampleLink.addEventListener('click', loadSampleData);

				// Skip mechanism
				document.addEventListener('keydown', (e) => {
					if (e.key === 'Tab' || e.key === 'Alt' || e.key === 'Meta') return;
					if (isTyping) {
						skipRequested = true;
						e.preventDefault();
					}
				});

				document.addEventListener('click', (e) => {
					// Don't skip when clicking interactive elements
					if (
						e.target.closest(
							'#card-actions, #drop-zone, #sample-link, .diagnosis-card, .attribution, #interview-panel, .mode-toggle',
						)
					)
						return;
					if (isTyping) skipRequested = true;
				});

				// Auto-scroll management
				let scrollTimeout;
				window.addEventListener('scroll', () => {
					if (!isTyping) return;
					clearTimeout(scrollTimeout);
					const atBottom =
						window.innerHeight + window.scrollY >=
						document.body.scrollHeight - 100;
					if (!atBottom) {
						userScrolledUp = true;
					} else {
						userScrolledUp = false;
					}
				});
			});
		</script>
